name: Rapport Semestriel

on:
  schedule:
    # 1er juillet à 18h00 UTC → S1 de l'année courante
    - cron: '0 18 1 7 *'
    # 2 janvier à 18h00 UTC → S2 de l'année précédente
    - cron: '0 18 2 1 *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Année (YYYY)'
        required: true
        default: '2026'
      semester:
        description: 'Semestre (1 ou 2)'
        required: true
        default: '1'

jobs:
  semiannual-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements/requirements_cloud.txt

      - name: Installer dependances
        run: pip install -r requirements/requirements_cloud.txt

      - name: Générer le rapport semestriel
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            YEAR="${{ github.event.inputs.year }}"
            SEM="${{ github.event.inputs.semester }}"
          else
            MONTH=$(date -u +%m)
            if [ "$MONTH" = "07" ]; then
              YEAR=$(date -u +%Y); SEM=1
            else
              # Janvier → S2 de l'année précédente
              YEAR=$(date -u -d "1 year ago" +%Y); SEM=2
            fi
          fi
          python scripts/generate_periodic_reports.py --period semiannual --year $YEAR --semester $SEM --force

      - name: Commit & push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "rapport: semestriel $(date -u +%Y)"
          file_pattern: data/pdfs/semestriel/
          commit_user_name: cgf-bot
          commit_user_email: bot@cgf-bourse.ci
