name: Détection Actions Corporatives (9h00 UTC)

on:
  workflow_dispatch:  # Lancement manuel uniquement — le check auto est intégré dans intraday.yml

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements/requirements_cloud.txt

      - name: Installer dépendances
        run: pip install -r requirements/requirements_cloud.txt

      - name: Vérifier actions corporatives
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/check_corporate_actions.py
