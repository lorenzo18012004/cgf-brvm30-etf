name: Détection Actions Corporatives (9h00 UTC)

on:
  schedule:
    - cron: '45 9 * * 1-5'  # 9h45 UTC, lundi-vendredi (15 min après ouverture marché)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_cloud.txt

      - name: Installer dépendances
        run: pip install -r requirements_cloud.txt

      - name: Vérifier actions corporatives
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python check_corporate_actions.py
