name: Appliquer Rebalancement (validation manuelle requise)

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_cloud.txt

      - name: Installer dépendances
        run: pip install -r requirements_cloud.txt

      - name: Appliquer le rebalancement en attente
        run: python scripts/apply_rebalancing.py

      - name: Commit rebalancement appliqué
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "rebal: application rebalancement $(date -u +'%Y-%m-%d')"
          file_pattern: |
            data/rebal_detail.json
            data/rebal_pending.json
          commit_user_name: cgf-bot
          commit_user_email: bot@cgf-bourse.ci
