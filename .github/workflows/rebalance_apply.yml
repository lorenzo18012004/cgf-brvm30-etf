name: Appliquer rebalancement trimestriel

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date du rebalancement (YYYY-MM-DD). Laisser vide = aujourd hui.'
        required: false
        default: ''
      confirmer:
        description: 'Tapez CONFIRMER pour appliquer réellement le rebalancement'
        required: true
        default: ''

jobs:
  rebalance:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Vérification confirmation
        run: |
          if [ "${{ github.event.inputs.confirmer }}" != "CONFIRMER" ]; then
            echo "ERREUR : Vous devez taper CONFIRMER dans le champ de confirmation."
            echo "         Aucun fichier n'a été modifié."
            exit 1
          fi
          echo "Confirmation reçue. Application du rebalancement."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements/requirements_cloud.txt

      - name: Installer dependances
        run: pip install -r requirements/requirements_cloud.txt

      - name: Mettre à jour les prix de clôture (Sika)
        run: python scripts/scrape_sika_history.py

      - name: Appliquer le rebalancement
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/rebalance_live.py --apply --force --date "${{ github.event.inputs.date }}"
          else
            python scripts/rebalance_live.py --apply --force
          fi

      - name: Recalculer la NAV avec le nouveau basket
        run: python scripts/calc_nav_cloud.py

      - name: Commit & push
        run: |
          git config user.name "cgf-bot"
          git config user.email "bot@cgf-bourse.ci"
          git add \
            data/nav_latest.json \
            data/sika_history.json \
            data/dashboard_data.json \
            data/rebal_detail.json
          if git diff --cached --quiet; then
            echo "[SKIP] Aucune modification à commiter."
          else
            REBAL_DATE="${{ github.event.inputs.date }}"
            REBAL_DATE="${REBAL_DATE:-$(date -u +'%Y-%m-%d')}"
            git commit -m "rebal: rebalancement trimestriel appliqué ${REBAL_DATE}"
            git pull --rebase origin main
            git push origin main
          fi
