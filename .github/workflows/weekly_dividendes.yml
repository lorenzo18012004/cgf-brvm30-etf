name: Mise à jour dividendes (hebdomadaire)

on:
  schedule:
    # Chaque vendredi à 17h00 UTC — après la clôture de semaine
    - cron: '0 17 * * 5'
  workflow_dispatch:

jobs:
  update-dividendes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_cloud.txt

      - name: Installer dépendances
        run: pip install -r requirements_cloud.txt

      - name: Scraper les dividendes Sika
        run: python scripts/scrape_sika_dividendes.py

      - name: Sauvegarder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: dividendes mis a jour $(date -u +'%Y-%m-%d')"
          file_pattern: |
            data/sika_dividendes.json
            data/dividend_history.json
          commit_user_name: cgf-bot
          commit_user_email: bot@cgf-bourse.ci
