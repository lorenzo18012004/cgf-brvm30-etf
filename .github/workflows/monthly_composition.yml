name: Mise à jour composition BRVM30

on:
  schedule:
    # 1er et 15 de chaque mois à 07h00 UTC — détecte les changements de composition
    - cron: '0 7 1,15 * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forcer la mise à jour même si composition inchangée'
        required: false
        default: false
        type: boolean

jobs:
  update-composition:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_cloud.txt

      - name: Installer dépendances
        run: pip install -r requirements_cloud.txt

      - name: Scraper la composition BRVM30
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python scripts/scrape_brvm_composition.py --force
          else
            python scripts/scrape_brvm_composition.py
          fi

      - name: Vérifier nouveau rebalancement à proposer
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/propose_rebalancing.py

      - name: Sauvegarder les changements
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: composition BRVM30 mise a jour $(date -u +'%Y-%m-%d')"
          file_pattern: |
            data/brvm_composition_latest.json
            data/brvm_composition_history.json
            data/rebal_pending.json
          commit_user_name: cgf-bot
          commit_user_email: bot@cgf-bourse.ci
