name: Rapport Journalier 16h

on:
  schedule:
    # 16h05 UTC, lundi-vendredi (marché BRVM fermé depuis 15h30)
    - cron: '5 16 * * 1-5'
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements/requirements_cloud.txt

      - name: Installer dependances
        run: pip install -r requirements/requirements_cloud.txt

      - name: Mettre à jour les prix de clôture (Sika)
        run: python scripts/scrape_sika_history.py

      - name: Recalculer la NAV
        run: python scripts/calc_nav_cloud.py

      - name: Snapshot de clôture iNAV (16h UTC — marché fermé)
        run: |
          current_hour=$(date -u +%H)
          if [ "$current_hour" -lt "17" ]; then
            python scripts/scrape_intraday_cloud.py --force
          else
            echo "[SKIP] Job trop retardé (${current_hour}h UTC), snapshot ignoré."
          fi

      - name: Mettre à jour brvm30_index_history (clôture officielle du jour)
        run: |
          python - <<'EOF'
          import json, os
          from datetime import date as _date

          ih_path   = "data/nav_intraday_history.json"
          brvm_path = "data/brvm30_index_history.json"

          if not os.path.exists(ih_path) or not os.path.exists(brvm_path):
              print("Fichiers manquants, skip.")
              exit(0)

          ih     = json.load(open(ih_path, encoding="utf-8"))
          brvm_h = json.load(open(brvm_path, encoding="utf-8"))

          from datetime import timedelta as _td
          today_iso = _date.today().isoformat()
          recent_cutoff = (_date.today() - _td(days=5)).isoformat()

          updated = 0
          for day, snaps in ih.items():
              if not snaps:
                  continue
              if day in brvm_h and day < recent_cutoff:
                  continue
              val = None
              for snap in reversed(snaps):
                  v = snap.get("brvm30_official")
                  if v:
                      val = float(v)
                      break
              if val:
                  brvm_h[day] = val
                  print(f"  Clôture {day}: {val}")
                  updated += 1

          from datetime import timedelta
          known = sorted((d, v) for d, v in brvm_h.items())
          interp = 0
          for i in range(len(known) - 1):
              d0, v0 = known[i]
              d1, v1 = known[i + 1]
              from datetime import date as _dt
              days = (_dt.fromisoformat(d1) - _dt.fromisoformat(d0)).days
              if days <= 1:
                  continue
              for step in range(1, days):
                  dmid = (_dt.fromisoformat(d0) + timedelta(days=step)).isoformat()
                  if dmid not in brvm_h:
                      brvm_h[dmid] = round(v0 + (v1 - v0) * step / days, 2)
                      interp += 1

          with open(brvm_path, "w", encoding="utf-8") as f:
              json.dump(brvm_h, f, ensure_ascii=False)
          print(f"brvm30_index_history.json mis a jour ({updated} ajout(s), {interp} interpolation(s)).")
          EOF

      - name: Générer le rapport PDF
        run: python scripts/generate_daily_report.py --force

      - name: Vérifier alertes NAV
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/send_alert.py || true

      - name: Envoyer par email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/send_report_email.py || true

      - name: Commit & push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: prix + NAV + rapport $(date -u +'%Y-%m-%d')"
          file_pattern: |
            data/sika_history.json
            data/nav_latest.json
            data/intraday_nav.json
            data/nav_intraday_history.json
            data/brvm30_index_history.json
            data/pdfs/
          commit_user_name: cgf-bot
          commit_user_email: bot@cgf-bourse.ci
