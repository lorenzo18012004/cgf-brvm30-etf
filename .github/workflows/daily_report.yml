name: Rapport Journalier 16h

on:
  schedule:
    - cron: '0 17 * * 1-5'
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements/requirements_cloud.txt

      - name: Installer dependances
        run: pip install -r requirements/requirements_cloud.txt

      - name: Mettre à jour les prix de clôture (Sika)
        run: python scripts/scrape_sika_history.py

      - name: Recalculer la NAV
        run: python scripts/calc_nav_cloud.py

      - name: Snapshot de clôture iNAV (16h UTC — marché fermé)
        run: |
          current_hour=$(date -u +%H)
          if [ "$current_hour" -lt "17" ]; then
            python scripts/scrape_intraday_cloud.py --force
          else
            echo "[SKIP] Job trop retardé (${current_hour}h UTC), snapshot ignoré."
          fi

      - name: Mettre à jour brvm30_index_history (clôture officielle du jour)
        run: python scripts/update_brvm30_history.py

      - name: Générer le rapport PDF
        run: python scripts/generate_daily_report.py --force

      - name: Vérifier alertes NAV
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/send_alert.py || true

      - name: Envoyer par email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/send_report_email.py || true

      - name: Commit & push
        run: |
          git config user.name "cgf-bot"
          git config user.email "bot@cgf-bourse.ci"
          git add \
            data/sika_history.json \
            data/nav_latest.json \
            data/intraday_nav.json \
            data/nav_intraday_history.json \
            data/brvm30_index_history.json \
            "data/pdfs/journalier/"
          if git diff --cached --quiet; then
            echo "[SKIP] Aucune modification à commiter."
          else
            git commit -m "data: prix + NAV + rapport $(date -u +'%Y-%m-%d')"
            git pull --rebase origin main
            git push origin main
          fi
