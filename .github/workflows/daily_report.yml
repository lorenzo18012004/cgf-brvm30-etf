name: Rapport Journalier 16h

on:
  schedule:
    # 16h05 UTC, lundi-vendredi (marché BRVM fermé depuis 15h30)
    - cron: '5 16 * * 1-5'
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_cloud.txt

      - name: Installer dependances
        run: pip install -r requirements_cloud.txt

      - name: Mettre à jour les prix de clôture (Sika)
        run: python scrape_sika_history.py

      - name: Recalculer la NAV
        run: python calc_nav_cloud.py

      - name: Snapshot de clôture iNAV (16h UTC — marché fermé)
        run: |
          current_hour=$(date -u +%H)
          if [ "$current_hour" -lt "17" ]; then
            python scrape_intraday_cloud.py --force
          else
            echo "[SKIP] Job trop retardé (${current_hour}h UTC), snapshot ignoré."
          fi

      - name: Mettre à jour brvm30_index_history (clôture officielle du jour)
        run: |
          python - <<'EOF'
          import json, os
          from datetime import date as _date

          ih_path   = "nav_intraday_history.json"
          brvm_path = "brvm30_index_history.json"

          if not os.path.exists(ih_path) or not os.path.exists(brvm_path):
              print("Fichiers manquants, skip.")
              exit(0)

          ih     = json.load(open(ih_path, encoding="utf-8"))
          brvm_h = json.load(open(brvm_path, encoding="utf-8"))

          updated = 0
          for day, snaps in ih.items():
              if not snaps or day in brvm_h:
                  continue
              # Dernier snapshot non-null (le snapshot 16h peut avoir brvm30=None si Sika timeout)
              val = None
              for snap in reversed(snaps):
                  v = snap.get("brvm30_official")
                  if v:
                      val = float(v)
                      break
              if val:
                  brvm_h[day] = val
                  print(f"  Clôture {day}: {val}")
                  updated += 1

          with open(brvm_path, "w", encoding="utf-8") as f:
              json.dump(brvm_h, f, ensure_ascii=False)
          print(f"brvm30_index_history.json mis a jour ({updated} date(s)).")
          EOF

      - name: Générer le rapport PDF
        run: python generate_daily_report.py --force

      - name: Envoyer par email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python send_report_email.py

      - name: Commit & push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: prix + NAV + rapport $(date -u +'%Y-%m-%d')"
          file_pattern: |
            sika_history.json
            nav_latest.json
            intraday_nav.json
            nav_intraday_history.json
            brvm30_index_history.json
            pdfs/
          commit_user_name: cgf-bot
          commit_user_email: bot@cgf-bourse.ci
