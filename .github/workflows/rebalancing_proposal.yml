name: Proposition Rebalancement BRVM30

on:
  schedule:
    # 1er de chaque mois à 08h00 UTC — le script vérifie lui-même s'il y a une nouvelle composition
    - cron: '0 8 1 * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forcer la proposition même si déjà proposée'
        required: false
        default: false
        type: boolean

jobs:
  propose:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_cloud.txt

      - name: Installer dépendances
        run: pip install -r requirements_cloud.txt

      - name: Vérifier nouvelle composition BRVM30
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python scripts/propose_rebalancing.py --force
          else
            python scripts/propose_rebalancing.py
          fi

      - name: Sauvegarder proposition (si générée)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "rebal: proposition automatique $(date -u +'%Y-%m-%d')"
          file_pattern: data/rebal_pending.json
          commit_user_name: cgf-bot
          commit_user_email: bot@cgf-bourse.ci
