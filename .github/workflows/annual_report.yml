name: Rapport Annuel

on:
  schedule:
    # 3 janvier à 18h00 UTC — génère le rapport de l'année écoulée
    - cron: '0 18 3 1 *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Année à générer (YYYY, vide = année précédente)'
        required: false
        default: ''

jobs:
  annual-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements/requirements_cloud.txt

      - name: Installer dependances
        run: pip install -r requirements/requirements_cloud.txt

      - name: Générer le rapport annuel
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            YEAR="${{ github.event.inputs.year }}"
          else
            YEAR=$(date -u -d "1 year ago" +%Y)
          fi
          python scripts/generate_periodic_reports.py --period annual --year $YEAR --force

      - name: Commit & push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "rapport: annuel $(date -u -d '1 year ago' +'%Y')"
          file_pattern: data/pdfs/annuel/
          commit_user_name: cgf-bot
          commit_user_email: bot@cgf-bourse.ci
