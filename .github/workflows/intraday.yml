name: iNAV 5min (BRVM heures de marche)

on:
  schedule:
    - cron: '*/5 9-15 * * 1-5'
  workflow_dispatch:

jobs:
  inav:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_cloud.txt

      - name: Installer dependances
        run: pip install -r requirements_cloud.txt

      - name: Calculer iNAV
        run: python scrape_intraday_cloud.py

      - name: Commit et push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "iNAV cloud: snapshot $(date -u +'%Y-%m-%d %H:%M') UTC"
          file_pattern: |
            intraday_nav.json
            nav_intraday_history.json
          commit_user_name: cgf-bot
          commit_user_email: bot@cgf-bourse.ci
