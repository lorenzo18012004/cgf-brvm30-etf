name: iNAV 5min (BRVM heures de marche)

on:
  schedule:
    - cron: '0 17 * * 1-5'
  push:
    paths:
      - 'intraday_nav.json'
  workflow_dispatch:

jobs:
  inav:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1

      - name: Verifier heures de marche
        id: check_hours
        run: |
          python3 -c "
          import os
          from datetime import datetime, timezone, time as dtime
          now = datetime.now(timezone.utc)
          t = now.time().replace(tzinfo=None)
          is_open = now.weekday() < 5 and dtime(9,0) <= t <= dtime(18,0)
          val = 'true' if is_open else 'false'
          print(f'market_open={val}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'market_open={val}\n')
          "

      - name: Attendre 5 minutes
        if: steps.check_hours.outputs.market_open == 'true'
        run: sleep 300

      - name: Setup Python 3.11
        if: steps.check_hours.outputs.market_open == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_cloud.txt

      - name: Installer dependances
        if: steps.check_hours.outputs.market_open == 'true'
        run: pip install -r requirements_cloud.txt

      - name: Calculer iNAV
        if: steps.check_hours.outputs.market_open == 'true'
        run: python scrape_intraday_cloud.py

      - name: Commit et push (PAT pour declencher boucle)
        if: steps.check_hours.outputs.market_open == 'true'
        run: |
          git config user.name "cgf-bot"
          git config user.email "bot@cgf-bourse.ci"
          git add intraday_nav.json nav_intraday_history.json
          git diff --staged --quiet || git commit -m "iNAV cloud: snapshot $(date -u +'%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
