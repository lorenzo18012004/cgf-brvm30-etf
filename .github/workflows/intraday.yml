name: iNAV 5min (BRVM heures de marche)

on:
  schedule:
    - cron: '30 9 * * 1-5'
  push:
    paths:
      - 'data/intraday_nav.json'
  workflow_dispatch:

jobs:
  inav:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1

      - name: Verifier heures de marche
        id: check_hours
        run: |
          python3 -c "
          import os
          from datetime import datetime, timezone, time as dtime
          now = datetime.now(timezone.utc)
          t = now.time().replace(tzinfo=None)
          is_open = now.weekday() < 5 and dtime(9,30) <= t <= dtime(15,30)
          val = 'true' if is_open else 'false'
          print(f'market_open={val}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'market_open={val}\n')
          "

      - name: Attendre 5 minutes
        if: steps.check_hours.outputs.market_open == 'true'
        run: sleep 300

      - name: Setup Python 3.11
        if: steps.check_hours.outputs.market_open == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_cloud.txt

      - name: Installer dependances
        if: steps.check_hours.outputs.market_open == 'true'
        run: pip install -r requirements_cloud.txt

      - name: Détection actions corporatives (1er snapshot du jour)
        if: steps.check_hours.outputs.market_open == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 -c "
          import json, os
          from datetime import date, datetime, timezone

          today = date.today().isoformat()
          hist_path = 'data/nav_intraday_history.json'

          # Lancer le check uniquement si aucun snapshot aujourd'hui
          already_done = False
          if os.path.exists(hist_path):
              hist = json.load(open(hist_path, encoding='utf-8'))
              already_done = bool(hist.get(today))

          if already_done:
              print(f'[{today}] Snapshots deja presents — check actions corpo ignore.')
          else:
              print(f'[{today}] Premier snapshot du jour — lancement check actions corporatives.')
              import subprocess
              result = subprocess.run(['python', 'scripts/check_corporate_actions.py'], capture_output=True, text=True)
              print(result.stdout)
              if result.returncode != 0:
                  print(result.stderr)
          "

      - name: Calculer iNAV
        if: steps.check_hours.outputs.market_open == 'true'
        run: python scripts/scrape_intraday_cloud.py

      - name: Commit et push (PAT pour declencher boucle)
        if: steps.check_hours.outputs.market_open == 'true'
        run: |
          git config user.name "cgf-bot"
          git config user.email "bot@cgf-bourse.ci"
          git add data/intraday_nav.json data/nav_intraday_history.json data/launch_state.json
          git diff --staged --quiet || git commit -m "iNAV cloud: snapshot $(date -u +'%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
